<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="260" viewBox="0 0 1100 260" role="img" aria-label="Metadata Scrubber Tool terminal demonstration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" rx="14" fill="#0b0f14"/>
  <rect x="18" y="18" width="1064" height="224" rx="12" fill="url(#bg)" stroke="#30363d" filter="url(#shadow)"/>
  <circle cx="46" cy="43" r="7" fill="#ff5f56"/>
  <circle cx="70" cy="43" r="7" fill="#ffbd2e"/>
  <circle cx="94" cy="43" r="7" fill="#27c93f"/>
  <text x="128" y="48" fill="#ff8a65" font-size="17" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Metadata Scrubber Tool</text>
  <line x1="18" y1="62" x2="1082" y2="62" stroke="#30363d"/>
  <text x="26" y="70" fill="#d6e7ff" font-size="16" font-family="Cascadia Mono, Consolas, Menlo, monospace">PS&gt; python .\metadata_scrubber.py inspect .\photo.jpg --details</text>
<text x="26" y="96" fill="#8bd5ff" font-size="16" font-family="Cascadia Mono, Consolas, Menlo, monospace">Detected file type: image/jpeg</text>
<text x="26" y="122" fill="#ffd166" font-size="16" font-family="Cascadia Mono, Consolas, Menlo, monospace">Private metadata: GPSLatitude, GPSLongitude, CameraModel, DateTimeOriginal</text>
<text x="26" y="148" fill="#d6e7ff" font-size="16" font-family="Cascadia Mono, Consolas, Menlo, monospace">PS&gt; python .\metadata_scrubber.py scrub .\photo.jpg --output .\photo_clean.jpg --details</text>
<text x="26" y="174" fill="#7ee787" font-size="16" font-family="Cascadia Mono, Consolas, Menlo, monospace">Scrubbed image saved: .\photo_clean.jpg</text>
<text x="26" y="200" fill="#7ee787" font-size="16" font-family="Cascadia Mono, Consolas, Menlo, monospace">Verification: 18 metadata fields removed, 0 private fields remain</text>
</svg>
